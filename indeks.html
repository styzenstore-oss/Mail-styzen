<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyzenID | Digital Product Store Terpercaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-btn { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="antialiased">

    <div id="authSection" class="fixed inset-0 z-[200] bg-slate-950 flex items-center justify-center p-6">
        <div class="glass-card p-8 rounded-[2rem] max-w-sm w-full text-center">
            <h2 class="text-3xl font-extrabold mb-2 uppercase tracking-tighter">Styzen<span class="text-indigo-500">ID</span></h2>
            <div id="loginForm" class="space-y-4">
                <input type="text" id="userEmail" placeholder="Username" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition text-sm">
                <input type="password" id="userPass" placeholder="Password" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition text-sm">
                <button onclick="handleAuth('login')" class="w-full py-3 gradient-btn rounded-xl font-bold">LOGIN</button>
                <p class="text-xs text-slate-500">Belum punya akun? <span class="text-indigo-400 cursor-pointer" onclick="toggleAuth(true)">Daftar</span></p>
            </div>
            <div id="signupForm" class="space-y-4 hidden-section">
                <input type="text" id="regUser" placeholder="Username Baru" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none">
                <input type="password" id="regPass" placeholder="Password Baru" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none">
                <button onclick="handleAuth('signup')" class="w-full py-3 bg-indigo-600 rounded-xl font-bold">REGISTER</button>
                <p class="text-xs text-slate-500">Sudah punya akun? <span class="text-indigo-400 cursor-pointer" onclick="toggleAuth(false)">Login</span></p>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden-section">
        <nav class="max-w-6xl mx-auto px-6 py-8 flex justify-between items-center">
            <div onclick="adminClick()" class="text-2xl font-extrabold tracking-tighter cursor-default select-none">Styzen<span class="text-indigo-500">ID</span></div>
            <div class="flex items-center gap-6">
                <button onclick="toggleHistory(true)" class="text-sm font-semibold text-slate-400 hover:text-white"><i class="fa-solid fa-clock-rotate-left mr-1"></i> History</button>
                <div class="relative cursor-pointer" onclick="openCart()">
                    <i class="fa-solid fa-cart-shopping text-xl text-slate-300"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-[10px] px-1.5 rounded-full">0</span>
                </div>
                <button onclick="logout()" class="text-slate-500"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8 pb-20">
            <div class="glass-card rounded-3xl p-8 text-center">
                <h2 class="text-xl font-bold">WISE ACCOUNT</h2>
                <p id="stock-WISE" class="text-[10px] text-slate-500 mt-1 uppercase">Stok: 0</p>
                <p class="text-indigo-400 font-bold my-4">Rp 200.000</p>
                <button onclick="addToCart('WISE', 200000)" class="w-full py-3 gradient-btn rounded-xl font-bold">+ Keranjang</button>
            </div>
            <div class="glass-card rounded-3xl p-8 text-center">
                <h2 class="text-xl font-bold">CANVA PRO</h2>
                <p id="stock-CANVA" class="text-[10px] text-slate-500 mt-1 uppercase">Stok: 0</p>
                <p class="text-indigo-400 font-bold my-4">Rp 5.000</p>
                <button onclick="addToCart('CANVA', 5000)" class="w-full py-3 gradient-btn rounded-xl font-bold">+ Keranjang</button>
            </div>
            <div class="glass-card rounded-3xl p-8 text-center">
                <h2 class="text-xl font-bold">PAYPAL VERIFIED</h2>
                <p id="stock-PAYPAL" class="text-[10px] text-slate-500 mt-1 uppercase">Stok: 0</p>
                <p class="text-indigo-400 font-bold my-4">Rp 20.000</p>
                <button onclick="addToCart('PAYPAL', 20000)" class="w-full py-3 gradient-btn rounded-xl font-bold">+ Keranjang</button>
            </div>
        </main>
    </div>

    <div id="adminModal" class="modal px-4">
        <div class="bg-slate-900 border border-indigo-500/30 p-6 rounded-[2rem] max-w-lg w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-indigo-400"><i class="fa-solid fa-user-shield mr-2"></i> Admin Stock Control</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-500">Pilih Produk</label>
                    <select id="adminProductSelect" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm outline-none">
                        <option value="WISE">WISE</option>
                        <option value="CANVA">CANVA</option>
                        <option value="PAYPAL">PAYPAL</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-slate-500">Input Data Akun (Satu baris satu akun: email:pass:2fa)</label>
                    <textarea id="adminStockInput" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-xs h-32 outline-none font-mono" placeholder="email1:pass1:2fa1&#10;email2:pass2:2fa2"></textarea>
                </div>
                <button onclick="addStock()" class="w-full py-3 bg-indigo-600 rounded-xl font-bold text-sm">TAMBAH STOK</button>
                <button onclick="document.getElementById('adminModal').classList.remove('active')" class="w-full text-slate-500 text-xs">Tutup</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="modal px-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-[2rem] max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-4">History & Akun</h3>
            <div id="historyList" class="space-y-3 max-h-80 overflow-y-auto mb-6 pr-2"></div>
            <button onclick="toggleHistory(false)" class="w-full py-3 bg-slate-800 rounded-xl font-bold">TUTUP</button>
        </div>
    </div>

    <div id="cartModal" class="modal px-4">
        <div class="bg-slate-900 p-6 rounded-[2rem] max-w-md w-full">
            <h3 class="text-xl font-bold mb-4">Keranjang</h3>
            <div id="cartItems" class="space-y-3 mb-6"></div>
            <div class="flex justify-between font-bold mb-6 border-t border-slate-800 pt-4">
                <span>Total</span>
                <span id="cartTotalText" class="text-indigo-400">Rp 0</span>
            </div>
            <div class="bg-white p-4 rounded-2xl mb-4 text-center">
                <img src="https://files.catbox.moe/s6s5x3.png" class="w-32 mx-auto mb-2">
                <p class="text-black text-[10px] font-bold">SCAN QRIS UNTUK BAYAR</p>
            </div>
            <button onclick="processPayment()" class="w-full py-4 gradient-btn rounded-2xl font-bold mb-3">SAYA SUDAH BAYAR</button>
            <button onclick="closeCart()" class="w-full text-slate-500 text-sm">Batal</button>
        </div>
    </div>

    <script>
        // Database In-Browser
        let globalStocks = JSON.parse(localStorage.getItem('styzen_stocks')) || { WISE: [], CANVA: [], PAYPAL: [] };
        let currentUser = JSON.parse(localStorage.getItem('styzen_user')) || null;
        let cart = [];
        let clickCount = 0;

        // --- ADMIN SYSTEM ---
        function adminClick() {
            clickCount++;
            if(clickCount >= 5) {
                document.getElementById('adminModal').classList.add('active');
                clickCount = 0;
            }
        }

        function addStock() {
            const product = document.getElementById('adminProductSelect').value;
            const input = document.getElementById('adminStockInput').value.trim();
            if(!input) return;

            const newItems = input.split('\n').filter(line => line.includes(':'));
            globalStocks[product] = [...globalStocks[product], ...newItems];
            
            localStorage.setItem('styzen_stocks', JSON.stringify(globalStocks));
            document.getElementById('adminStockInput').value = '';
            updateStockDisplay();
            alert(`Berhasil menambah ${newItems.length} stok untuk ${product}`);
        }

        function updateStockDisplay() {
            for (let prod in globalStocks) {
                const el = document.getElementById(`stock-${prod}`);
                if(el) el.innerText = `Stok: ${globalStocks[prod].length}`;
            }
        }

        // --- AUTH ---
        function toggleAuth(isSignup) {
            document.getElementById('loginForm').classList.toggle('hidden-section', isSignup);
            document.getElementById('signupForm').classList.toggle('hidden-section', !isSignup);
        }

        function handleAuth(type) {
            if(type === 'signup') {
                const u = document.getElementById('regUser').value;
                const p = document.getElementById('regPass').value;
                if(!u || !p) return;
                localStorage.setItem(`user_${u}`, JSON.stringify({username: u, password: p, history: []}));
                alert("Berhasil! Silakan Login."); toggleAuth(false);
            } else {
                const u = document.getElementById('userEmail').value;
                const p = document.getElementById('userPass').value;
                const data = JSON.parse(localStorage.getItem(`user_${u}`));
                if(data && data.password === p) {
                    currentUser = data;
                    localStorage.setItem('styzen_user', JSON.stringify(data));
                    initApp();
                } else alert("Salah!");
            }
        }

        function initApp() {
            if(!currentUser) return;
            document.getElementById('authSection').classList.add('hidden-section');
            document.getElementById('mainApp').classList.remove('hidden-section');
            updateStockDisplay();
        }

        function logout() { localStorage.removeItem('styzen_user'); location.reload(); }

        // --- CORE LOGIC ---
        function addToCart(name, price) {
            if(globalStocks[name].length === 0) return alert("Maaf, stok habis!");
            const idx = cart.findIndex(i => i.name === name);
            if(idx > -1) {
                if(cart[idx].qty >= globalStocks[name].length) return alert("Stok tidak mencukupi!");
                cart[idx].qty++;
            } else cart.push({name, price, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            let total = 0, count = 0, html = '';
            cart.forEach(item => {
                total += item.price * item.qty; count += item.qty;
                html += `<div class="flex justify-between text-xs bg-slate-800 p-3 rounded-lg"><span>${item.name} (${item.qty}x)</span><span>Rp ${(item.price * item.qty).toLocaleString()}</span></div>`;
            });
            document.getElementById('cartItems').innerHTML = html || '<p class="text-center text-slate-500 py-4">Kosong</p>';
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartTotalText').innerText = "Rp " + total.toLocaleString();
        }

        function openCart() { document.getElementById('cartModal').classList.add('active'); }
        function closeCart() { document.getElementById('cartModal').classList.remove('active'); }

        function processPayment() {
            if(cart.length === 0) return;
            
            // Cek sekali lagi apakah stok masih ada
            for(let item of cart) {
                if(globalStocks[item.name].length < item.qty) return alert(`Stok ${item.name} tiba-tiba habis!`);
            }

            const txId = "STZ-" + Math.floor(Date.now()/1000);
            let purchasedAccounts = [];

            // AMBIL AKUN DARI STOK (DIPOTONG)
            cart.forEach(item => {
                for(let i=0; i < item.qty; i++) {
                    const account = globalStocks[item.name].shift(); // Ambil paling atas
                    purchasedAccounts.push({ product: item.name, data: account });
                }
            });

            // Update Database Stok & User
            localStorage.setItem('styzen_stocks', JSON.stringify(globalStocks));
            
            const historyEntry = {
                txId,
                date: new Date().toLocaleString(),
                accounts: purchasedAccounts,
                total: cart.reduce((a,b)=>a+(b.price*b.qty),0)
            };

            currentUser.history.unshift(historyEntry);
            localStorage.setItem(`user_${currentUser.username}`, JSON.stringify(currentUser));
            localStorage.setItem('styzen_user', JSON.stringify(currentUser));

            alert("Pembayaran Berhasil! Akun sudah dikirim ke History.");
            cart = [];
            updateCartUI();
            updateStockDisplay();
            closeCart();
            toggleHistory(true);
        }

        function toggleHistory(show) {
            if(show) {
                let html = '';
                currentUser.history.forEach(h => {
                    html += `
                    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 text-xs">
                        <div class="flex justify-between text-slate-500 mb-2"><span>${h.txId}</span><span>${h.date}</span></div>
                        <div class="space-y-2">
                            ${h.accounts.map(acc => `
                                <div class="bg-slate-900 p-2 rounded border border-indigo-500/20">
                                    <p class="text-indigo-400 font-bold mb-1">${acc.product}</p>
                                    <code class="text-white block break-all">${acc.data}</code>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                });
                document.getElementById('historyList').innerHTML = html || '<p class="text-center text-slate-500">Belum ada akun.</p>';
            }
            document.getElementById('historyModal').classList.toggle('active', show);
        }

        function openCart() { document.getElementById('cartModal').classList.add('active'); }
        function closeCart() { document.getElementById('cartModal').classList.remove('active'); }

        window.onload = initApp;
    </script>
</body>
</html>
