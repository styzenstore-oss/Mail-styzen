<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyzenID | Digital Produk Terpercaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .section-view { display: none; }
        .active-view { display: block !important; }
        .admin-sub-tab { display: none; }
        .admin-sub-tab.active { display: block; }
        #chatWidget { position: fixed; bottom: 100px; right: 20px; width: 320px; height: 450px; background: white; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); display: none; flex-direction: column; z-index: 1000; border: 1px solid #f1f5f9; }
        #chatBtn { position: fixed; bottom: 100px; right: 20px; width: 64px; height: 64px; border-radius: 32px; background: #2563eb; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3); cursor: pointer; z-index: 1001; }
        .cart-dot { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 8px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="userApp" class="section-view active-view min-h-screen pb-32">
        <nav class="bg-white px-6 py-4 border-b flex justify-between items-center sticky top-0 z-50">
            <span class="font-black text-xl text-blue-600">StyzenID</span>
            <div class="flex items-center gap-3">
                <button onclick="openCart()" class="relative p-2 text-slate-600">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span id="cartCount" class="cart-dot">0</span>
                </button>
                <div class="bg-blue-600 px-4 py-1.5 rounded-full text-white text-[10px] font-bold">
                    <span id="userBalanceDisplay">Rp 0</span>
                </div>
            </div>
        </nav>

        <div class="max-w-md mx-auto p-6">
            <div id="tab-store" class="user-tab">
                <h3 class="font-black text-lg mb-4">Produk Digital</h3>
                <div id="productDisplay" class="grid gap-4"></div>
            </div>
        </div>

        <div id="chatBtn" onclick="toggleChat()"><i class="fa-solid fa-headset"></i></div>
        <div id="chatWidget">
            <div class="p-4 bg-blue-600 rounded-t-[24px] text-white flex justify-between">
                <span class="font-bold text-sm">Customer Support</span>
                <button onclick="toggleChat()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="chatContent" class="flex-1 p-4 overflow-y-auto space-y-3 bg-slate-50"></div>
            <div class="p-3 border-t flex gap-2">
                <input type="text" id="chatInput" placeholder="Ketik pesan..." class="flex-1 p-2 bg-slate-100 rounded-xl text-xs outline-none">
                <button onclick="sendChat()" class="bg-blue-600 text-white p-2 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="cartModal" class="fixed inset-0 bg-black/50 z-[2000] hidden flex items-end justify-center">
            <div class="bg-white w-full max-w-md rounded-t-[32px] p-6 animate-slide-up">
                <div class="flex justify-between mb-6">
                    <h3 class="font-black text-xl">Keranjang Belanja</h3>
                    <button onclick="closeCart()"><i class="fa-solid fa-xmark text-slate-400"></i></button>
                </div>
                <div id="cartItems" class="space-y-4 mb-6 max-h-60 overflow-y-auto"></div>
                <div class="border-t pt-4">
                    <div class="flex justify-between mb-4"><span class="font-bold">Total:</span><span id="cartTotal" class="font-black text-blue-600">Rp 0</span></div>
                    <button onclick="checkout()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs">Bayar Sekarang</button>
                </div>
            </div>
        </div>
    </div>

    <div id="adminLogin" class="section-view min-h-screen flex items-center justify-center bg-slate-950 p-6">
        <div class="w-full max-w-sm bg-slate-900 p-8 rounded-[32px] border border-slate-800">
            <h2 class="text-white font-black text-2xl mb-2 text-center">Admin Login</h2>
            <p class="text-slate-500 text-xs text-center mb-8">Masukkan kredensial khusus akses kontrol</p>
            <input type="text" id="admUser" placeholder="Username" class="w-full p-4 bg-slate-950 rounded-2xl border border-slate-800 text-white mb-3 outline-none">
            <input type="password" id="admPass" placeholder="Password" class="w-full p-4 bg-slate-950 rounded-2xl border border-slate-800 text-white mb-6 outline-none">
            <button onclick="handleLogin()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold uppercase text-xs">Masuk Console</button>
        </div>
    </div>

    <div id="adminLayout" class="section-view bg-slate-950 min-h-screen text-slate-300">
        <header class="p-6 border-b border-slate-900 flex justify-between items-center bg-slate-950 sticky top-0 z-50">
            <h1 class="font-black text-white">SYSTEM <span class="text-blue-500">CONTROL</span></h1>
            <button onclick="logoutAdmin()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-[10px] font-bold">LOGOUT</button>
        </header>
        <div class="p-6 grid gap-6">
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                <h3 class="font-bold text-white mb-4">Chat Member</h3>
                <div id="adminChatList" class="space-y-3"></div>
            </div>
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                <h3 class="font-bold text-white mb-4">Kelola Stok & Produk</h3>
                <input type="text" id="pName" placeholder="Nama Produk" class="w-full p-4 bg-slate-950 rounded-xl mb-3 border border-slate-800">
                <input type="number" id="pPrice" placeholder="Harga" class="w-full p-4 bg-slate-950 rounded-xl mb-4 border border-slate-800">
                <button onclick="saveProduct()" class="w-full bg-blue-600 py-3 rounded-xl font-bold mb-6">TAMBAH PRODUK</button>
                <select id="pSelect" class="w-full p-4 bg-slate-950 rounded-xl mb-3 border border-slate-800"></select>
                <textarea id="pStockData" placeholder="Input Data Stok (Baris Baru)" class="w-full h-24 bg-slate-950 p-4 rounded-xl mb-3 border border-slate-800"></textarea>
                <button onclick="injectStock()" class="w-full bg-white text-black py-3 rounded-xl font-bold">UPDATE STOK</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDS5JjgqG03qAujVRYMBkZde0SBFumWhq8",
            authDomain: "styzenstore-9c0f9.firebaseapp.com",
            databaseURL: "https://styzenstore-9c0f9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "styzenstore-9c0f9",
            storageBucket: "styzenstore-9c0f9.firebasestorage.app",
            messagingSenderId: "368732944579",
            appId: "1:368732944579:web:f43ecd278f369aca0a8a76"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let curU = localStorage.getItem('st_user') || "User_" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('st_user', curU);

        let cart = [];

        // --- AUTH ADMIN ---
        async function handleLogin() {
            const u = document.getElementById('admUser').value;
            const p = document.getElementById('admPass').value;
            // Default Admin (Kamu bisa ganti di database Firebase pada node 'admin_config')
            if(u === "adminjuna" && p === "juna123") {
                sessionStorage.setItem('isAdmin', 'true');
                location.hash = "#adminpage";
                checkRoute();
            } else {
                alert("Login Gagal!");
            }
        }
        function logoutAdmin() {
            sessionStorage.removeItem('isAdmin');
            location.hash = "";
            checkRoute();
        }

        // --- KERANJANG SYSTEM ---
        function addToCart(name, price) {
            cart.push({name, price});
            updateCartUI();
        }
        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const cont = document.getElementById('cartItems');
            let total = 0;
            cont.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                    <span class="text-xs font-bold">${item.name}</span>
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-black text-blue-600">Rp ${item.price.toLocaleString()}</span>
                        <button onclick="removeFromCart(${index})" class="text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = "Rp " + total.toLocaleString();
        }
        function removeFromCart(i) { cart.splice(i, 1); updateCartUI(); }
        function openCart() { document.getElementById('cartModal').classList.remove('hidden'); }
        function closeCart() { document.getElementById('cartModal').classList.add('hidden'); }

        async function checkout() {
            if(cart.length === 0) return alert("Keranjang kosong!");
            const total = cart.reduce((a, b) => a + b.price, 0);
            const userRef = db.ref('users/'+curU+'/balance');
            const bal = (await userRef.once('value')).val() || 0;

            if(bal < total) return alert("Saldo tidak cukup! Silakan Topup.");

            // Proses beli (potong saldo dan ambil stok)
            await userRef.set(bal - total);
            alert("Pembelian Berhasil! Cek riwayat untuk data akun.");
            cart = [];
            updateCartUI();
            closeCart();
        }

        // --- CHAT SYSTEM ---
        function toggleChat() {
            const w = document.getElementById('chatWidget');
            w.style.display = w.style.display === 'flex' ? 'none' : 'flex';
            if(w.style.display === 'flex') {
                db.ref('chats/'+curU).on('value', snap => {
                    const cont = document.getElementById('chatContent');
                    cont.innerHTML = '';
                    snap.forEach(c => {
                        const d = c.val();
                        const cls = d.sender === 'user' ? 'bg-blue-600 text-white self-end rounded-t-xl rounded-l-xl' : 'bg-white text-slate-700 self-start rounded-t-xl rounded-r-xl border';
                        cont.innerHTML += `<div class="${cls} p-3 text-[11px] max-w-[80%]">${d.msg}</div>`;
                    });
                    cont.scrollTop = cont.scrollHeight;
                });
            }
        }
        async function sendChat() {
            const m = document.getElementById('chatInput').value;
            if(!m) return;
            await db.ref('chats/'+curU).push({sender:'user', msg:m, time:Date.now()});
            document.getElementById('chatInput').value = '';
        }

        // --- ADMIN CHAT ---
        function listenAdminChat() {
            db.ref('chats').on('value', snap => {
                const cont = document.getElementById('adminChatList');
                cont.innerHTML = '';
                snap.forEach(u => {
                    const msgs = Object.values(u.val());
                    const last = msgs[msgs.length-1];
                    cont.innerHTML += `<div class="bg-slate-950 p-4 rounded-2xl flex justify-between items-center border border-slate-800">
                        <div><p class="text-xs font-bold text-blue-500">${u.key}</p><p class="text-[10px]">${last.msg}</p></div>
                        <button onclick="replyChat('${u.key}')" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px]">BALAS</button>
                    </div>`;
                });
            });
        }
        async function replyChat(id) {
            const m = prompt("Balas ke "+id+":");
            if(m) await db.ref('chats/'+id).push({sender:'admin', msg:m, time:Date.now()});
        }

        // --- DATA & ROUTING ---
        function listenProducts() {
            db.ref('products').on('value', async snap => {
                const list = snap.val() || [];
                const cont = document.getElementById('productDisplay');
                const sel = document.getElementById('pSelect');
                cont.innerHTML = ''; sel.innerHTML = '';
                for(let p of list) {
                    const stk = (await db.ref('stocks/'+p.name).once('value')).val() || [];
                    sel.innerHTML += `<option value="${p.name}">${p.name}</option>`;
                    cont.innerHTML += `<div class="bg-white p-5 rounded-[28px] border flex justify-between items-center">
                        <div><p class="font-bold text-slate-800">${p.name}</p><p class="text-blue-600 font-black text-xs">Rp ${p.price.toLocaleString()}</p></div>
                        <div class="text-right"><p class="text-[8px] text-slate-400 mb-1">STOK: ${stk.length}</p>
                        <button onclick="addToCart('${p.name}', ${p.price})" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold">TAMBAH</button></div>
                    </div>`;
                }
            });
        }

        async function saveProduct() {
            const name = document.getElementById('pName').value.toUpperCase();
            const price = parseInt(document.getElementById('pPrice').value);
            let list = (await db.ref('products').once('value')).val() || [];
            list.push({name, price});
            await db.ref('products').set(list);
            alert("OK!");
        }

        async function injectStock() {
            const p = document.getElementById('pSelect').value;
            const d = document.getElementById('pStockData').value.trim();
            let cur = (await db.ref('stocks/'+p).once('value')).val() || [];
            await db.ref('stocks/'+p).set([...cur, ...d.split('\n')]);
            alert("Update Berhasil!");
        }

        function checkRoute() {
            const h = window.location.hash;
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active-view'));

            if(h === "#adminpage") {
                if(!isAdmin) {
                    document.getElementById('adminLogin').classList.add('active-view');
                } else {
                    document.getElementById('adminLayout').classList.add('active-view');
                    listenAdminChat();
                }
            } else {
                document.getElementById('userApp').classList.add('active-view');
                listenProducts();
                db.ref('users/'+curU+'/balance').on('value', s => {
                    document.getElementById('userBalanceDisplay').innerText = "Rp " + (s.val() || 0).toLocaleString();
                });
            }
        }

        window.onhashchange = checkRoute;
        window.onload = checkRoute;
    </script>
</body>
                    </html>
