<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StyzenID |Digital Product Solution </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow: hidden; }
        .page-view { display: none; height: 100vh; overflow-y: auto; width: 100%; -webkit-overflow-scrolling: touch; }
        .active-view { display: block !important; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        button:active { transform: scale(0.98); }
        .card-custom { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
    </style>
</head>
<body>

    <div id="viewAuth" class="page-view flex-col items-center justify-center bg-white p-6">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-4xl font-black text-blue-600 mb-10 italic">StyzenID</h1>
            <div class="space-y-4">
                <input type="text" id="authUser" placeholder="Username" class="w-full p-5 bg-slate-50 rounded-2xl border font-bold outline-none">
                <input type="password" id="authPass" placeholder="Password" class="w-full p-5 bg-slate-50 rounded-2xl border font-bold outline-none">
                <button onclick="authAction('login')" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-[11px] uppercase">Masuk</button>
                <button onclick="authAction('reg')" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-[11px] uppercase">Daftar</button>
                <p class="text-[10px] text-slate-400 mt-4 cursor-pointer" onclick="window.location.hash='#adminlogin'; location.reload();">Login Admin Console</p>
            </div>
        </div>
    </div>

    <div id="viewUserApp" class="page-view">
        <nav class="glass px-6 py-4 border-b flex justify-between items-center sticky top-0 z-50">
            <span class="font-black text-xl text-blue-600 italic">StyzenID</span>
            <div onclick="swTab('topup')" class="bg-blue-600 px-4 py-2 rounded-full text-white text-[10px] font-black cursor-pointer">
                <span id="userBalanceDisplay">Rp 0</span>
            </div>
        </nav>

        <div class="max-w-md mx-auto p-6 pb-40 space-y-6">
            
            <div id="tabHome" class="tab-content active space-y-4">
                <div class="card-custom text-center space-y-2">
                    <h2 class="text-xl font-black text-slate-800">Selamat Datang di StyzenID</h2>
                    <p class="text-[10px] text-slate-500 font-medium">Toko Digital terpercaya untuk kebutuhan gaming & lisensi Anda.</p>
                    <div class="flex justify-center gap-1 text-amber-400 py-2">
                        <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        <span class="text-slate-400 text-[10px] ml-1 font-bold">(4.9/5 Rating)</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="card-custom flex flex-col items-center justify-center py-4 bg-blue-50 border-blue-100">
                        <i class="fa-solid fa-bolt text-blue-600 mb-1"></i>
                        <p class="text-[8px] font-black uppercase text-blue-600">Proses Cepat</p>
                    </div>
                    <div class="card-custom flex flex-col items-center justify-center py-4 bg-emerald-50 border-emerald-100">
                        <i class="fa-solid fa-shield-halved text-emerald-600 mb-1"></i>
                        <p class="text-[8px] font-black uppercase text-emerald-600">100% Aman</p>
                    </div>
                </div>

                <h3 class="font-black text-slate-800 text-xs uppercase tracking-widest mt-6">Produk Kami</h3>
                <div id="productDisplay" class="grid gap-4"></div>

                <div class="card-custom mt-6 space-y-3">
                    <h3 class="font-black text-xs uppercase italic">Komentar Pelanggan</h3>
                    <div id="commentList" class="space-y-3 max-h-40 overflow-y-auto pr-2 text-[10px]"></div>
                    <div class="flex gap-2">
                        <input type="text" id="userComment" placeholder="Tulis review..." class="flex-1 p-3 bg-slate-50 border rounded-xl text-[10px] outline-none">
                        <button onclick="postComment()" class="bg-blue-600 text-white px-4 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <div id="tabTopup" class="tab-content space-y-6">
                <div class="card-custom space-y-4">
                    <h3 class="font-black text-slate-800">Isi Saldo</h3>
                    <input type="number" id="topupAmount" placeholder="Nominal" class="w-full p-5 bg-slate-50 rounded-2xl border font-bold text-xl text-blue-600 outline-none">
                    <div class="grid gap-2">
                        <button onclick="createAutoPayment()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px]">PEMBAYARAN OTOMATIS (MIDTRANS)</button>
                        <button onclick="requestManualTopup()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px]">QRIS MANUAL (KONFIRMASI ADMIN)</button>
                    </div>
                    <div id="pendingCard" class="hidden bg-amber-50 p-4 rounded-2xl border border-amber-100 text-center">
                        <p id="pendingInfo" class="text-[9px] font-bold text-amber-700"></p>
                        <button id="btnClaimAuto" onclick="checkPaymentStatus()" class="hidden w-full py-3 mt-2 bg-amber-500 text-white rounded-xl font-black text-[10px]">CEK & KLAIM SALDO</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-sm bg-white glass border rounded-full shadow-2xl p-2 flex justify-around z-50">
            <button onclick="swTab('home')" class="nav-btn flex-1 py-4 text-slate-300 active" id="btn-home"><i class="fa-solid fa-house"></i></button>
            <button onclick="swTab('topup')" class="nav-btn flex-1 py-4 text-slate-300" id="btn-topup"><i class="fa-solid fa-wallet"></i></button>
            <button onclick="logout()" class="flex-1 py-4 text-red-400"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </div>

    <div id="viewAdmin" class="page-view bg-slate-950 text-slate-300">
        <header class="p-6 border-b border-slate-900 flex justify-between items-center bg-slate-950 sticky top-0 z-50">
            <h1 class="font-black text-white italic text-sm">ADMIN SYSTEM V17</h1>
            <button onclick="logout()" class="text-red-500 font-bold text-xs">EXIT</button>
        </header>

        <div class="p-6 space-y-8 pb-24">
            <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800">
                <h3 class="text-white font-black text-xs uppercase mb-4 text-blue-400">Persetujuan Topup Manual</h3>
                <div id="adminManualList" class="space-y-4"></div>
            </div>

            <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 space-y-4">
                <h3 class="text-white font-bold text-xs uppercase">Produk & Harga</h3>
                <input type="text" id="pName" placeholder="Nama Produk" class="w-full p-3 bg-slate-950 rounded-xl border border-slate-800 text-white text-[10px]">
                <input type="number" id="pPrice" placeholder="Harga" class="w-full p-3 bg-slate-950 rounded-xl border border-slate-800 text-white text-[10px]">
                <button onclick="saveProduct()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-white text-[10px]">SAVE PRODUK / HARGA</button>
            </div>

            <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 space-y-4">
                <h3 class="text-white font-bold text-xs uppercase">Integrasi API</h3>
                <input type="text" id="cfgClientKey" placeholder="Client Key" class="w-full p-3 bg-slate-950 rounded-xl border border-slate-800 text-white text-[10px]">
                <input type="password" id="cfgServerKey" placeholder="Server Key" class="w-full p-3 bg-slate-950 rounded-xl border border-slate-800 text-white text-[10px]">
                <button onclick="saveAdminCfg()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold text-white text-[10px]">SIMPAN API</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDS5JjgqG03qAujVRYMBkZde0SBFumWhq8",
            authDomain: "styzenstore-9c0f9.firebaseapp.com",
            databaseURL: "https://styzenstore-9c0f9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "styzenstore-9c0f9",
            storageBucket: "styzenstore-9c0f9.firebasestorage.app",
            messagingSenderId: "368732944579",
            appId: "1:368732944579:web:f43ecd278f369aca0a8a76"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. ROUTING & AUTH
        function checkRoute() {
            const h = window.location.hash;
            const u = localStorage.getItem('logged_user');
            const adm = sessionStorage.getItem('isAdmin');
            document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active-view'));

            if (h === "#adminpage" && adm === 'true') {
                document.getElementById('viewAdmin').classList.add('active-view');
                loadAdminConsole();
            } else if (h === "#adminlogin") {
                const p = prompt("Admin Key:");
                if(p === "Junzz12@@") { sessionStorage.setItem('isAdmin', 'true'); window.location.hash = "#adminpage"; location.reload(); }
                else { window.location.hash = ""; location.reload(); }
            } else if (u) {
                document.getElementById('viewUserApp').classList.add('active-view');
                loadUserApp(u);
            } else {
                document.getElementById('viewAuth').classList.add('active-view');
            }
        }

        async function authAction(type) {
            const u = document.getElementById('authUser').value.trim().toLowerCase();
            const p = document.getElementById('authPass').value;
            if(!u || !p) return alert("Isi data!");
            if(type === 'login') {
                const s = await db.ref('accounts/'+u).once('value');
                if(s.exists() && s.val().password === p) { localStorage.setItem('logged_user', u); location.reload(); }
                else alert("Data salah!");
            } else {
                await db.ref('accounts/'+u).set({ password: p, balance: 0 });
                alert("Berhasil!");
            }
        }

        // 2. USER FEATURES
        function loadUserApp(u) {
            db.ref('accounts/'+u+'/balance').on('value', s => {
                document.getElementById('userBalanceDisplay').innerText = "Rp " + (s.val()||0).toLocaleString();
            });
            db.ref('products').on('value', s => {
                const d = document.getElementById('productDisplay'); d.innerHTML = "";
                s.forEach(p => {
                    d.innerHTML += `<div class="card-custom flex justify-between items-center">
                        <div><p class="font-black text-slate-800 text-sm">${p.key}</p><p class="text-blue-600 font-bold text-xs">Rp ${p.val().price.toLocaleString()}</p></div>
                        <button onclick="alert('Saldo tidak cukup!')" class="bg-slate-900 text-white px-6 py-2 rounded-xl text-[9px] font-black italic">BELI</button>
                    </div>`;
                });
            });
            db.ref('comments').limitToLast(10).on('value', s => {
                const l = document.getElementById('commentList'); l.innerHTML = "";
                s.forEach(c => {
                    l.innerHTML += `<div class="bg-slate-50 p-2 rounded-lg border"><b>@${c.val().user}:</b> ${c.val().text}</div>`;
                });
            });
        }

        async function postComment() {
            const t = document.getElementById('userComment').value.trim();
            const u = localStorage.getItem('logged_user');
            if(t) {
                await db.ref('comments').push({ user: u, text: t });
                document.getElementById('userComment').value = "";
            }
        }

        // 3. TOPUP SYSTEM (AUTO & MANUAL)
        async function createAutoPayment() {
            const amt = parseInt(document.getElementById('topupAmount').value);
            if(!amt || amt < 10000) return alert("Min Rp 10.000");
            const oid = "AUTO-" + Date.now();
            localStorage.setItem('last_oid', oid);
            localStorage.setItem('last_amt', amt);
            await db.ref('pending_trx/'+oid).set({ user: localStorage.getItem('logged_user'), amount: amt, type: 'auto' });
            document.getElementById('pendingCard').classList.remove('hidden');
            document.getElementById('pendingInfo').innerText = "MIDTRANS ORDER: " + oid;
            document.getElementById('btnClaimAuto').classList.remove('hidden');
        }

        async function requestManualTopup() {
            const amt = parseInt(document.getElementById('topupAmount').value);
            if(!amt || amt < 10000) return alert("Min Rp 10.000");
            const mid = "MANUAL-" + Date.now();
            await db.ref('manual_requests/'+mid).set({ 
                user: localStorage.getItem('logged_user'), 
                amount: amt, 
                status: 'pending',
                time: new Date().toLocaleString()
            });
            document.getElementById('pendingCard').classList.remove('hidden');
            document.getElementById('pendingInfo').innerText = "PERMINTAAN MANUAL TERKIRIM. TUNGGU ADMIN.";
            document.getElementById('btnClaimAuto').classList.add('hidden');
        }

        // 4. ADMIN LOGIC
        function loadAdminConsole() {
            db.ref('manual_requests').on('value', s => {
                const list = document.getElementById('adminManualList'); list.innerHTML = "";
                s.forEach(r => {
                    const d = r.val();
                    if(d.status === 'pending') {
                        list.innerHTML += `<div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                            <div><p class="text-blue-500 font-black text-xs uppercase">${d.user}</p><p class="text-white font-bold">Rp ${d.amount.toLocaleString()}</p></div>
                            <div class="flex gap-2">
                                <button onclick="approveManual('${r.key}', '${d.user}', ${d.amount})" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[9px] font-black">ACC</button>
                                <button onclick="db.ref('manual_requests/${r.key}').remove()" class="bg-red-600/20 text-red-500 px-4 py-2 rounded-xl text-[9px] font-black">X</button>
                            </div>
                        </div>`;
                    }
                });
            });
            db.ref('admin_settings').once('value', s => {
                if(s.exists()) {
                    document.getElementById('cfgClientKey').value = s.val().client_key || "";
                    document.getElementById('cfgServerKey').value = s.val().server_key || "";
                }
            });
        }

        async function approveManual(key, user, amt) {
            const uRef = db.ref('accounts/'+user+'/balance');
            const cur = (await uRef.once('value')).val() || 0;
            await uRef.set(cur + amt);
            await db.ref('manual_requests/'+key).update({ status: 'success' });
            alert("Approve Sukses!");
        }

        // SISA FUNGSI (Save Product, Save Admin Cfg, checkPaymentStatus) SAMA SEPERTI V16...
        async function saveProduct() {
            const n = document.getElementById('pName').value.trim();
            const p = parseInt(document.getElementById('pPrice').value);
            if(n && p) { await db.ref('products/'+n).set({ price: p }); alert("Update Berhasil!"); }
        }
        async function saveAdminCfg() {
            const ck = document.getElementById('cfgClientKey').value;
            const sk = document.getElementById('cfgServerKey').value;
            await db.ref('admin_settings').update({ client_key: ck, server_key: sk }); alert("API Tersimpan!");
        }

        function swTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
            document.getElementById('btn-' + t).classList.add('active');
        }

        function logout() { localStorage.clear(); sessionStorage.clear(); window.location.hash = ""; location.reload(); }

        window.onload = checkRoute;
        window.onhashchange = checkRoute;
    </script>
</body>
    </html>
