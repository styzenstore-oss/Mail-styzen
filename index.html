<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyzenID - Custom Temp Mail</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --border-color: #334155;
            --input-bg: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--accent-color); margin: 0 0 10px 0; font-size: 22px; }

        /* Input Area */
        .input-group {
            display: flex;
            align-items: center;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 5px 15px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            font-size: 16px;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
        }

        .domain-label {
            color: #64748b;
            font-weight: bold;
            padding-left: 10px;
            user-select: none;
        }

        /* Action Buttons */
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-gen { background: var(--accent-color); color: #0f172a; }
        .btn-check { background: #10b981; color: white; }
        .btn-copy { background: #475569; color: white; }
        button:hover { opacity: 0.9; }

        /* Inbox Style */
        .inbox-box {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .mail-item {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            margin-top: 15px;
            line-height: 1.6;
        }

        .status-text {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
        }

        #loading { display: none; color: var(--accent-color); text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>StyzenID Mail System</h1>
            <p style="color: #94a3b8; font-size: 14px;">Setel username sesukamu</p>
        </div>

        <div class="input-group">
            <input type="text" id="username" placeholder="ketik_username_disini" onkeyup="updateFullEmail()">
            <span class="domain-label" id="displayDomain">@styzensphere.my.id</span>
        </div>

        <div class="actions">
            <button class="btn-gen" onclick="randomize()">Acak</button>
            <button class="btn-check" onclick="manualCheck()">Cek Email</button>
            <button class="btn-copy" onclick="copyToClipboard()">Salin</button>
        </div>

        <div class="inbox-box">
            <div id="loading">Sedang memeriksa pesan...</div>
            <div id="mailDisplay">
                <p class="status-text">Masukkan username dan klik Cek Email.</p>
            </div>
        </div>
    </div>

    <script>
        /* --- KONFIGURASI WAJIB --- */
        const workerUrl = "https://nibacoobest01.allkenzie38.workers.dev/
        "; 
        const myDomain = "styzensphere.my.id"; // Ganti dengan domain Anda
        /* -------------------------- */

        document.getElementById('displayDomain').innerText = "@" + myDomain;

        function updateFullEmail() {
            // Fungsi ini memastikan kita punya data email yang lengkap
            const user = document.getElementById('username').value;
            return user ? `${user}@${myDomain}` : "";
        }

        function randomize() {
            const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
            let result = "";
            for (let i = 0; i < 8; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('username').value = result;
            manualCheck();
        }

        function copyToClipboard() {
            const fullEmail = updateFullEmail();
            if (!fullEmail) return alert("Isi username dulu!");
            
            const el = document.createElement('textarea');
            el.value = fullEmail;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Alamat email disalin: " + fullEmail);
        }

        async function manualCheck() {
            const fullEmail = updateFullEmail();
            if (!fullEmail) return;
            if (!workerUrl.includes("http")) return alert("Config Error: Worker URL belum diisi!");

            const display = document.getElementById('mailDisplay');
            const loader = document.getElementById('loading');
            
            loader.style.display = "block";

            try {
                const response = await fetch(`${workerUrl}?addr=${fullEmail}`);
                const data = await response.text();
                loader.style.display = "none";

                if (data && data !== "Belum ada pesan masuk." && data !== "Worker Active") {
                    display.innerHTML = `
                        <div class="mail-item">
                            <strong style="color:var(--accent-color)">Pesan Baru:</strong><br>
                            <pre style="white-space: pre-wrap; font-family: sans-serif; font-size: 14px; color: #cbd5e1;">${data}</pre>
                        </div>
                    `;
                } else {
                    display.innerHTML = `<p class="status-text">Belum ada pesan masuk untuk <br><strong>${fullEmail}</strong></p>`;
                }
            } catch (err) {
                loader.style.display = "none";
                display.innerHTML = `<p class="status-text" style="color:#ef4444">Gagal terhubung ke Cloudflare.</p>`;
            }
        }

        // Auto Refresh setiap 10 detik
        setInterval(() => {
            if (document.getElementById('username').value) {
                manualCheck();
            }
        }, 10000);
    </script>
</body>
</html>
