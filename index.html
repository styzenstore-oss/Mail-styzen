<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyzenID | Digital Store Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .gradient-btn { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; }
    </style>
</head>
<body class="antialiased">

    <nav class="max-w-6xl mx-auto px-6 py-8 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tighter">Styzen<span class="text-indigo-500">ID</span></div>
        <div class="relative cursor-pointer" onclick="openCart()">
            <i class="fa-solid fa-cart-shopping text-2xl text-slate-300"></i>
            <span id="cartCount" class="cart-badge">0</span>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto px-6 py-12 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">Digital Service <span class="text-indigo-500">Cart System</span></h1>
        <p class="text-slate-400">Pilih produk, atur jumlah, dan bayar sekaligus.</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8 pb-24">
        <div class="glass-card rounded-3xl p-8 flex flex-col items-center">
            <i class="fa-solid fa-vault text-green-400 text-3xl mb-4"></i>
            <h2 class="text-xl font-bold">WISE</h2>
            <p class="text-indigo-400 font-bold mb-6">Rp 200.000</p>
            <button onclick="addToCart('WISE', 200000)" class="w-full py-3 gradient-btn rounded-xl font-bold transition transform active:scale-95">
                + Keranjang
            </button>
        </div>

        <div class="glass-card rounded-3xl p-8 flex flex-col items-center">
            <i class="fa-solid fa-palette text-blue-400 text-3xl mb-4"></i>
            <h2 class="text-xl font-bold">CANVA</h2>
            <p class="text-indigo-400 font-bold mb-6">Rp 5.000</p>
            <button onclick="addToCart('CANVA', 5000)" class="w-full py-3 gradient-btn rounded-xl font-bold transition transform active:scale-95">
                + Keranjang
            </button>
        </div>

        <div class="glass-card rounded-3xl p-8 flex flex-col items-center">
            <i class="fa-brands fa-paypal text-sky-400 text-3xl mb-4"></i>
            <h2 class="text-xl font-bold">PAYPAL</h2>
            <p class="text-indigo-400 font-bold mb-6">Rp 20.000</p>
            <button onclick="addToCart('PAYPAL', 20000)" class="w-full py-3 gradient-btn rounded-xl font-bold transition transform active:scale-95">
                + Keranjang
            </button>
        </div>
    </main>

    <div id="cartModal" class="modal px-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-[2rem] max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-4 flex items-center"><i class="fa-solid fa-basket-shopping mr-2 text-indigo-500"></i> Keranjang Anda</h3>
            
            <div id="cartItems" class="space-y-4 max-h-60 overflow-y-auto mb-6 pr-2">
                </div>

            <div class="border-t border-slate-800 pt-4 mb-6">
                <div class="flex justify-between font-bold text-lg">
                    <span>Total Belanja</span>
                    <span id="cartTotalText" class="text-indigo-400">Rp 0</span>
                </div>
            </div>

            <button onclick="goToCheckout()" class="w-full py-4 gradient-btn rounded-2xl font-bold text-white mb-3">
                LANJUT PEMBAYARAN
            </button>
            <button onclick="closeCart()" class="w-full text-slate-500 text-sm font-semibold">Kembali Belanja</button>
        </div>
    </div>

    <div id="payModal" class="modal px-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] max-w-sm w-full text-center shadow-2xl">
            <span id="displayTxId" class="bg-indigo-500/10 text-indigo-400 px-3 py-1 rounded-full text-xs font-bold border border-indigo-500/20 mb-4 inline-block"></span>
            <h3 class="text-xl font-bold mb-6 italic text-white">Invoice StyzenID</h3>
            
            <div class="bg-white p-4 rounded-3xl mb-6">
                <img src="https://files.catbox.moe/9d3nxh.png" alt="QRIS" class="mx-auto w-44 rounded-lg">
                <p class="text-black text-[10px] mt-2 font-bold uppercase tracking-widest">A/N RAKAA SHOP</p>
            </div>

            <div class="bg-slate-800/50 rounded-2xl p-4 mb-6 text-left text-sm">
                <div id="invoiceDetails" class="text-slate-300 space-y-1 mb-3 border-b border-slate-700 pb-2"></div>
                <div class="flex justify-between font-bold text-indigo-400">
                    <span>Total + Kode Unik</span>
                    <span id="modalFinalPrice"></span>
                </div>
            </div>

            <button onclick="confirmWhatsApp()" class="w-full py-4 bg-green-600 text-white rounded-2xl font-bold mb-3">KONFIRMASI WHATSAPP</button>
            <button onclick="closePay()" class="text-slate-500 text-xs">Batal</button>
        </div>
    </div>

    <script>
        let cart = [];
        let finalOrder = { txId: "", total: 0, itemsString: "" };

        function addToCart(name, price) {
            const index = cart.findIndex(item => item.name === name);
            if (index > -1) {
                cart[index].qty++;
            } else {
                cart.push({ name, price, qty: 1 });
            }
            updateCartUI();
        }

        function updateQty(name, delta) {
            const index = cart.findIndex(item => item.name === name);
            if (index > -1) {
                cart[index].qty += delta;
                if (cart[index].qty <= 0) cart.splice(index, 1);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotalText = document.getElementById('cartTotalText');
            
            let html = '';
            let total = 0;
            let count = 0;

            cart.forEach(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                count += item.qty;
                html += `
                <div class="flex justify-between items-center bg-slate-800/40 p-3 rounded-xl border border-slate-700">
                    <div>
                        <p class="font-bold text-sm text-white">${item.name}</p>
                        <p class="text-xs text-slate-400">Rp ${item.price.toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="updateQty('${item.name}', -1)" class="w-6 h-6 rounded bg-slate-700 flex items-center justify-center text-white">-</button>
                        <span class="text-sm font-bold">${item.qty}</span>
                        <button onclick="updateQty('${item.name}', 1)" class="w-6 h-6 rounded bg-indigo-600 flex items-center justify-center text-white">+</button>
                    </div>
                </div>`;
            });

            cartItems.innerHTML = html || '<p class="text-center text-slate-500 py-4">Keranjang kosong</p>';
            cartCount.innerText = count;
            cartTotalText.innerText = "Rp " + total.toLocaleString('id-ID');
            finalOrder.total = total;
        }

        function openCart() { document.getElementById('cartModal').classList.add('active'); }
        function closeCart() { document.getElementById('cartModal').classList.remove('active'); }

        function goToCheckout() {
            if (cart.length === 0) return alert("Keranjang masih kosong!");
            
            const txId = "TX-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            const uniqueCode = Math.floor(Math.random() * 899) + 100;
            const finalPrice = finalOrder.total + uniqueCode;

            let detailsHtml = '';
            let itemsText = '';
            cart.forEach(item => {
                detailsHtml += `<div class="flex justify-between"><span>${item.qty}x ${item.name}</span><span>Rp ${(item.price * item.qty).toLocaleString()}</span></div>`;
                itemsText += `- ${item.name} (${item.qty}x)%0A`;
            });

            finalOrder.txId = txId;
            finalOrder.itemsString = itemsText;
            finalOrder.finalPrice = finalPrice;

            document.getElementById('displayTxId').innerText = "ORDER ID: " + txId;
            document.getElementById('invoiceDetails').innerHTML = detailsHtml;
            document.getElementById('modalFinalPrice').innerText = "Rp " + finalPrice.toLocaleString('id-ID');
            
            closeCart();
            document.getElementById('payModal').classList.add('active');
        }

        function closePay() { document.getElementById('payModal').classList.remove('active'); }

        function confirmWhatsApp() {
            const wa = "6281232715307";
            const message = `*KONFIRMASI ORDER - STYZENID*%0A` +
                            `------------------------------%0A` +
                            `*TX ID:* ${finalOrder.txId}%0A` +
                            `*Pesanan:*%0A${finalOrder.itemsString}` +
                            `------------------------------%0A` +
                            `*Total Transfer:* Rp ${finalOrder.finalPrice.toLocaleString('id-ID')}%0A` +
                            `*Status:* Sudah Bayar%0A` +
                            `------------------------------%0A` +
                            `Halo Admin, saya sudah transfer sesuai nominal di atas. Mohon diproses.`;
            window.location.href = `https://wa.me/${wa}?text=${message}`;
        }
    </script>
</body>
</html>
