<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StyzenID | Auto-System V15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .page-view { display: none; height: 100vh; overflow-y: auto; width: 100%; }
        .active-view { display: block !important; }
        .nav-btn.active { color: #2563eb !important; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div id="viewUserApp" class="page-view">
        <nav class="glass px-6 py-4 border-b flex justify-between items-center sticky top-0 z-50">
            <span class="font-black text-xl text-blue-600 italic">StyzenID</span>
            <div class="bg-blue-600 px-4 py-2 rounded-full text-white text-[10px] font-black" id="userBalanceDisplay">Rp 0</div>
        </nav>

        <div class="max-w-md mx-auto p-6 pb-40">
            <div id="tabTopup" class="tab-content active space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                    <h3 class="font-black text-slate-800">Top Up Otomatis</h3>
                    <input type="number" id="topupAmount" placeholder="Nominal" class="w-full p-5 bg-slate-50 rounded-2xl border font-bold text-xl text-blue-600 outline-none">
                    <button onclick="createAutoPayment()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-[10px] shadow-lg shadow-blue-200">BAYAR SEKARANG</button>
                </div>

                <div id="pendingCard" class="hidden bg-amber-50 border border-amber-200 p-6 rounded-[2.5rem] text-center space-y-4">
                    <div class="animate-pulse flex justify-center"><i class="fa-solid fa-spinner fa-spin text-amber-500 text-2xl"></i></div>
                    <div>
                        <p class="text-[10px] font-black text-amber-800 uppercase">Menunggu Pembayaran</p>
                        <p id="pendingOrderId" class="text-[8px] text-amber-600 font-mono"></p>
                    </div>
                    <button onclick="checkPaymentStatus()" class="w-full py-4 bg-amber-500 text-white rounded-2xl font-black text-[10px]">CEK & KLAIM SALDO</button>
                    <p class="text-[9px] text-amber-600 italic">Klik tombol jika sudah bayar di Midtrans</p>
                </div>
            </div>
        </div>

        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-sm bg-white glass border rounded-full shadow-2xl p-2 flex justify-around z-50">
            <button onclick="swTab('home')" class="nav-btn flex-1 py-4 text-slate-300" id="btn-home"><i class="fa-solid fa-house"></i></button>
            <button onclick="swTab('topup')" class="nav-btn flex-1 py-4 text-slate-300 active" id="btn-topup"><i class="fa-solid fa-wallet"></i></button>
            <button onclick="logout()" class="flex-1 py-4 text-red-400"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </div>

    <div id="viewAdmin" class="page-view bg-slate-950 text-slate-300">
        <header class="p-6 border-b border-slate-900 flex justify-between items-center bg-slate-950">
            <h1 class="font-black text-white italic">ADMIN CORE</h1>
            <button onclick="logout()" class="text-red-500 font-bold text-xs">EXIT</button>
        </header>
        <div class="p-6 space-y-6">
            <div class="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 space-y-4">
                <h3 class="text-white font-bold text-sm">Integrasi Midtrans</h3>
                <div>
                    <label class="text-[9px] font-bold text-slate-500 uppercase">Server Key (Rahasia)</label>
                    <input type="password" id="cfgServerKey" class="w-full p-4 bg-slate-950 rounded-xl border border-slate-800 text-white text-xs outline-none">
                </div>
                <button onclick="saveAdminCfg()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-white text-[10px]">SIMPAN KEY</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDS5JjgqG03qAujVRYMBkZde0SBFumWhq8",
            authDomain: "styzenstore-9c0f9.firebaseapp.com",
            databaseURL: "https://styzenstore-9c0f9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "styzenstore-9c0f9",
            storageBucket: "styzenstore-9c0f9.firebasestorage.app",
            messagingSenderId: "368732944579",
            appId: "1:368732944579:web:f43ecd278f369aca0a8a76"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- CORE AUTO-PAYMENT ---

        async function createAutoPayment() {
            const amount = parseInt(document.getElementById('topupAmount').value);
            const user = localStorage.getItem('logged_user');
            if(!amount || amount < 10000) return alert("Minimal Rp 10.000");

            const orderID = "STYZEN-" + Math.floor(Math.random() * 999999);
            
            // Simpan status pending ke Firebase
            await db.ref('auto_payments/' + orderID).set({
                user: user,
                amount: amount,
                status: 'pending'
            });

            // Tampilkan card pengecekan
            document.getElementById('pendingCard').classList.remove('hidden');
            document.getElementById('pendingOrderId').innerText = "ORDER ID: " + orderID;
            localStorage.setItem('last_order_id', orderID);

            // BUKA MIDTRANS (Bisa pakai Payment Link manual kamu atau Redirect)
            alert("Order Dibuat! Silakan bayar melalui Link Midtrans yang diberikan Admin/Sistem.");
        }

        async function checkPaymentStatus() {
            const orderID = localStorage.getItem('last_order_id');
            const user = localStorage.getItem('logged_user');
            
            const cfg = await db.ref('admin_settings').once('value');
            const sKey = cfg.val()?.server_key;

            if(!sKey) return alert("Admin belum setting Server Key!");

            // Enkripsi Server Key untuk Auth (Basic Auth)
            const authHeader = btoa(sKey + ":");

            try {
                // Tembak langsung ke API Midtrans untuk cek status asli
                const res = await fetch(`https://api.sandbox.midtrans.com/v2/${orderID}/status`, {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Basic ' + authHeader,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });

                const data = await res.json();

                // LOGIKA: Hanya jika status 'settlement' (SUDAH BAYAR)
                if (data.transaction_status === 'settlement' || data.transaction_status === 'capture') {
                    
                    const payRef = db.ref('auto_payments/' + orderID);
                    const payData = (await payRef.once('value')).val();

                    if(payData.status === 'claimed') return alert("Saldo sudah pernah diklaim!");

                    // Tambah saldo user secara otomatis
                    const userRef = db.ref('accounts/' + user + '/balance');
                    const currentBal = (await userRef.once('value')).val() || 0;
                    
                    await userRef.set(currentBal + payData.amount);
                    await payRef.update({ status: 'claimed' }); // Tandai agar tidak bisa klaim berkali-kali

                    alert("BERHASIL! Uang diterima Midtrans. Saldo otomatis ditambahkan.");
                    document.getElementById('pendingCard').classList.add('hidden');
                } else {
                    alert("Gagal: Pembayaran belum masuk (Status: " + (data.transaction_status || "Pending") + ")");
                }
            } catch (err) {
                alert("Koneksi Error! Pastikan Server Key benar.");
            }
        }

        // --- ADMIN CONFIG ---
        async function saveAdminCfg() {
            const key = document.getElementById('cfgServerKey').value;
            await db.ref('admin_settings').set({ server_key: key });
            alert("Server Key Disimpan!");
        }

        // FUNGSI ROUTING & AUTH (Sama seperti sebelumnya)
        function checkRoute() {
            const h = window.location.hash;
            const u = localStorage.getItem('logged_user');
            document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active-view'));

            if(h === "#adminpage") {
                document.getElementById('viewAdmin').classList.add('active-view');
            } else if(u) {
                document.getElementById('viewUserApp').classList.add('active-view');
                db.ref('accounts/'+u+'/balance').on('value', s => {
                    document.getElementById('userBalanceDisplay').innerText = "Rp " + (s.val()||0).toLocaleString();
                });
            } else {
                document.body.innerHTML = "Harap refresh dan Login.";
            }
        }

        function swTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
            document.getElementById('btn-' + t).classList.add('active');
        }

        window.onload = checkRoute;
    </script>
</body>
</html>
