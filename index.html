<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyzenID | Enterprise Digital Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background-color: #f8fafc; color: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; }
        .section-view { display: none; }
        .active-view { display: block !important; }
        .admin-sub-tab { display: none; }
        .admin-sub-tab.active { display: block; }
        .admin-sidebar-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        /* Chat Widget Styles */
        #chatWidget { position: fixed; bottom: 100px; right: 20px; width: 300px; height: 400px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; flex-direction: column; z-index: 1000; border: 1px solid #e2e8f0; }
        #chatBtn { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; border-radius: 30px; background: #2563eb; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); cursor: pointer; z-index: 1001; transition: 0.3s; }
        .chat-bubble-user { background: #2563eb; color: white; align-self: flex-end; padding: 8px 12px; border-radius: 15px 15px 0 15px; max-width: 80%; font-size: 12px; }
        .chat-bubble-admin { background: #f1f5f9; color: #334155; align-self: flex-start; padding: 8px 12px; border-radius: 15px 15px 15px 0; max-width: 80%; font-size: 12px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <div id="userApp" class="section-view active-view min-h-screen pb-32">
        <nav class="bg-white px-6 py-4 border-b flex justify-between items-center sticky top-0 z-50">
            <span class="font-black text-xl text-blue-600 tracking-tighter">StyzenID</span>
            <div class="bg-blue-600 px-4 py-1.5 rounded-full text-white text-[10px] font-bold">
                <span id="userBalanceDisplay">Rp 0</span>
            </div>
        </nav>

        <div class="max-w-md mx-auto p-6">
            <div id="tab-store" class="user-tab">
                <div id="promoBanner" class="mb-6"></div>
                <h3 class="font-black text-lg mb-4 text-slate-800">Produk Digital</h3>
                <div id="productDisplay" class="grid gap-4"></div>
            </div>

            <div id="tab-topup" class="user-tab hidden">
                <h3 class="font-black text-xl mb-6">Topup Saldo</h3>
                <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                    <input type="number" id="topupAmt" placeholder="Nominal Topup" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border-none">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="reqManual()" class="py-4 bg-slate-900 text-white rounded-2xl font-bold text-[10px] uppercase">Manual QRIS</button>
                        <button onclick="reqMidtrans()" class="py-4 bg-blue-600 text-white rounded-2xl font-bold text-[10px] uppercase">Midtrans Auto</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="chatBtn" onclick="toggleChat()"><i class="fa-solid fa-comment-dots"></i></div>
        <div id="chatWidget">
            <div class="p-4 border-b bg-blue-600 rounded-t-2xl flex justify-between items-center">
                <span class="text-white font-bold text-xs">Customer Service StyzenID</span>
                <button onclick="toggleChat()" class="text-white/50"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="chatContent" class="flex-1 p-4 flex flex-col gap-3 overflow-y-auto bg-slate-50"></div>
            <div class="p-3 border-t flex gap-2">
                <input type="text" id="chatInput" placeholder="Tulis pesan..." class="flex-1 p-2 text-xs outline-none bg-slate-100 rounded-lg">
                <button onclick="sendChat()" class="bg-blue-600 text-white p-2 rounded-lg"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white border rounded-full shadow-2xl p-2 flex justify-around z-50">
            <button onclick="swTab('store')" class="nav-btn flex-1 py-3 text-slate-300"><i class="fa-solid fa-house"></i></button>
            <button onclick="swTab('topup')" class="nav-btn flex-1 py-3 text-slate-300"><i class="fa-solid fa-wallet"></i></button>
        </div>
    </div>

    <div id="adminLayout" class="section-view bg-slate-950 min-h-screen text-slate-300">
        <header class="p-6 border-b border-slate-900 flex justify-between items-center">
            <h1 class="text-xl font-black text-white">CONSOLE <span class="text-blue-500">ADMIN</span></h1>
            <button onclick="location.hash=''" class="bg-slate-900 px-4 py-2 rounded-xl text-[10px]">LOGOUT</button>
        </header>

        <div class="flex flex-col lg:flex-row min-h-[calc(100vh-80px)]">
            <aside class="w-full lg:w-64 p-4 border-r border-slate-900 space-y-2">
                <button onclick="swAdm('dash')" class="admin-sidebar-btn w-full p-4 rounded-xl text-left text-xs font-bold border border-transparent active">Dashboard & Topup</button>
                <button onclick="swAdm('chat')" class="admin-sidebar-btn w-full p-4 rounded-xl text-left text-xs font-bold border border-transparent">Chat Member</button>
                <button onclick="swAdm('products')" class="admin-sidebar-btn w-full p-4 rounded-xl text-left text-xs font-bold border border-transparent">Kelola Produk</button>
                <button onclick="swAdm('api')" class="admin-sidebar-btn w-full p-4 rounded-xl text-left text-xs font-bold border border-transparent">API Midtrans</button>
            </aside>

            <main class="flex-1 p-6">
                <div id="adm-dash" class="admin-sub-tab active space-y-4">
                    <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Antrean Topup</h2>
                    <div id="adminTopupList" class="grid gap-3"></div>
                </div>

                <div id="adm-chat" class="admin-sub-tab space-y-4">
                    <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Pesan Masuk</h2>
                    <div id="adminChatList" class="grid gap-3"></div>
                </div>

                <div id="adm-products" class="admin-sub-tab space-y-6">
                    <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                        <h3 class="font-bold mb-4">Produk & Stok</h3>
                        <div class="grid gap-3 mb-4">
                            <input type="text" id="pName" placeholder="Nama Produk" class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                            <input type="number" id="pPrice" placeholder="Harga" class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                            <button onclick="saveProduct()" class="bg-blue-600 py-3 rounded-xl font-bold">TAMBAH</button>
                        </div>
                        <select id="pSelect" class="w-full bg-slate-950 p-4 rounded-xl mb-3 border border-slate-800"></select>
                        <textarea id="pStockData" placeholder="Input Stok (Baris Baru)" class="w-full h-24 bg-slate-950 p-4 rounded-xl border border-slate-800 mb-3"></textarea>
                        <button onclick="injectStock()" class="w-full bg-white text-black py-3 rounded-xl font-bold uppercase text-xs">UPDATE STOK</button>
                    </div>
                </div>

                <div id="adm-api" class="admin-sub-tab">
                    <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
                        <h3 class="font-bold text-blue-400">Settings Database & API</h3>
                        <input type="text" id="apiClient" placeholder="Midtrans Client Key" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <input type="password" id="apiServer" placeholder="Midtrans Server Key" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <button onclick="saveApi()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold uppercase">SIMPAN KONFIGURASI</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDS5JjgqG03qAujVRYMBkZde0SBFumWhq8",
            authDomain: "styzenstore-9c0f9.firebaseapp.com",
            databaseURL: "https://styzenstore-9c0f9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "styzenstore-9c0f9",
            storageBucket: "styzenstore-9c0f9.firebasestorage.app",
            messagingSenderId: "368732944579",
            appId: "1:368732944579:web:f43ecd278f369aca0a8a76"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let curU = localStorage.getItem('st_user') || "User_" + Math.floor(Math.random()*1000);

        // --- NAVIGATION ---
        function swTab(t) {
            document.querySelectorAll('.user-tab').forEach(x => x.classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
        }
        function swAdm(t) {
            document.querySelectorAll('.admin-sub-tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.admin-sidebar-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('adm-'+t).classList.add('active');
            event.target.classList.add('active');
            if(t === 'chat') listenAdminChat();
        }

        // --- CHAT SYSTEM (USER) ---
        function toggleChat() {
            const w = document.getElementById('chatWidget');
            w.style.display = w.style.display === 'flex' ? 'none' : 'flex';
            if(w.style.display === 'flex') listenChat();
        }

        async function sendChat() {
            const msg = document.getElementById('chatInput').value;
            if(!msg) return;
            await db.ref('chats/' + curU).push({ sender: 'user', msg: msg, time: Date.now() });
            document.getElementById('chatInput').value = '';
        }

        function listenChat() {
            db.ref('chats/' + curU).on('value', snap => {
                const cont = document.getElementById('chatContent');
                cont.innerHTML = '';
                snap.forEach(c => {
                    const d = c.val();
                    cont.innerHTML += `<div class="${d.sender === 'user' ? 'chat-bubble-user' : 'chat-bubble-admin'}">${d.msg}</div>`;
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        // --- CHAT SYSTEM (ADMIN) ---
        function listenAdminChat() {
            db.ref('chats').on('value', snap => {
                const cont = document.getElementById('adminChatList');
                cont.innerHTML = '';
                snap.forEach(userChat => {
                    const lastMsg = Object.values(userChat.val()).pop();
                    cont.innerHTML += `
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                        <div><p class="text-xs font-bold text-blue-500">${userChat.key}</p><p class="text-xs text-white">${lastMsg.msg}</p></div>
                        <button onclick="replyChat('${userChat.key}')" class="bg-blue-600 px-3 py-1 rounded text-[10px]">BALAS</button>
                    </div>`;
                });
            });
        }

        async function replyChat(uid) {
            const msg = prompt("Balas pesan " + uid + ":");
            if(msg) await db.ref('chats/' + uid).push({ sender: 'admin', msg: msg, time: Date.now() });
        }

        // --- PRODUCT & STOCK ---
        async function saveProduct() {
            const name = document.getElementById('pName').value.toUpperCase();
            const price = parseInt(document.getElementById('pPrice').value);
            if(!name || !price) return;
            let list = (await db.ref('products').once('value')).val() || [];
            list.push({name, price});
            await db.ref('products').set(list);
            alert("Produk Berhasil Ditambahkan!");
        }

        async function injectStock() {
            const p = document.getElementById('pSelect').value;
            const data = document.getElementById('pStockData').value.trim();
            if(!data) return;
            let current = (await db.ref('stocks/'+p).once('value')).val() || [];
            current = [...current, ...data.split('\n')];
            await db.ref('stocks/'+p).set(current);
            alert("Stok Berhasil Diupdate!");
        }

        function listenProducts() {
            db.ref('products').on('value', async snap => {
                const list = snap.val() || [];
                const cont = document.getElementById('productDisplay');
                const sel = document.getElementById('pSelect');
                cont.innerHTML = ''; sel.innerHTML = '';
                for(let p of list) {
                    const stk = (await db.ref('stocks/'+p.name).once('value')).val() || [];
                    sel.innerHTML += `<option value="${p.name}">${p.name}</option>`;
                    cont.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border flex justify-between items-center shadow-sm">
                        <div><p class="font-bold text-slate-800">${p.name}</p><p class="text-blue-600 font-black text-xs">Rp ${p.price.toLocaleString()}</p></div>
                        <div class="text-right"><p class="text-[8px] text-slate-400 font-bold mb-1">STOK: ${stk.length}</p><button class="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase">Beli</button></div>
                    </div>`;
                }
            });
        }

        // --- TOPUP ---
        async function reqManual() {
            const amt = parseInt(document.getElementById('topupAmt').value);
            if(!amt || amt < 10000) return alert("Min Rp 10.000");
            const tid = "T-" + Date.now();
            await db.ref('topup_requests/' + tid).set({ id: tid, user: curU, amount: amt, status: 'pending', time: Date.now() });
            alert("Laporan terkirim! Admin akan mengecek m-banking.");
        }

        function listenAdminTopup() {
            db.ref('topup_requests').on('value', snap => {
                const cont = document.getElementById('adminTopupList');
                cont.innerHTML = '';
                snap.forEach(r => {
                    const d = r.val();
                    if(d.status === 'pending') {
                        cont.innerHTML += `
                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                            <div><p class="text-[10px] text-blue-500">${d.user}</p><p class="font-bold text-white">Rp ${d.amount.toLocaleString()}</p></div>
                            <button onclick="accTopup('${d.id}','${d.user}',${d.amount})" class="bg-emerald-600 px-4 py-2 rounded-lg text-[10px] font-bold">ACC</button>
                        </div>`;
                    }
                });
            });
        }

        async function accTopup(id, u, amt) {
            const uRef = db.ref('users/'+u+'/balance');
            const bal = (await uRef.once('value')).val() || 0;
            await uRef.set(bal + amt);
            await db.ref('topup_requests/'+id).update({status:'success'});
            alert("Saldo Berhasil Masuk!");
        }

        // --- SETTINGS ---
        async function saveApi() {
            const c = document.getElementById('apiClient').value;
            const s = document.getElementById('apiServer').value;
            await db.ref('settings/api').set({ client: c, server: s });
            alert("API Keys Tersimpan!");
        }

        function checkRoute() {
            const h = window.location.hash;
            document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active-view'));
            if(h === '#adminpage') {
                document.getElementById('adminLayout').classList.add('active-view');
                listenAdminTopup();
            } else {
                document.getElementById('userApp').classList.add('active-view');
                listenProducts();
                db.ref('users/'+curU+'/balance').on('value', s => {
                    document.getElementById('userBalanceDisplay').innerText = "Rp " + (s.val() || 0).toLocaleString();
                });
            }
        }

        window.onhashchange = checkRoute;
        window.onload = checkRoute;
    </script>
</body>
</html>
