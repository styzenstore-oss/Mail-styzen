<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyzenID | Secure Payment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script type="text/javascript" src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="SB-Mid-client-MASUKKAN_CLIENT_KEY"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background-color: #f8fafc; color: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; }
        .section-view { display: none; }
        .active-view { display: block !important; }
        .nav-btn.active { color: #2563eb !important; }
        .admin-card { background: #0f172a; border-radius: 1.5rem; padding: 1.5rem; color: white; border: 1px solid #1e293b; }
    </style>
</head>
<body>

    <div id="userApp" class="section-view active-view min-h-screen pb-32">
        <nav class="bg-white px-6 py-4 border-b flex justify-between items-center sticky top-0 z-50">
            <span class="font-black text-xl text-blue-600">StyzenID</span>
            <div class="bg-blue-600 px-4 py-1.5 rounded-full text-white text-[10px] font-bold">
                <span id="userBalanceDisplay">Rp 0</span>
            </div>
        </nav>

        <div class="max-w-md mx-auto p-6">
            <div id="tab-topup" class="user-tab">
                <h3 class="font-black text-xl mb-6">Isi Saldo</h3>
                
                <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Jumlah Topup</label>
                        <input type="number" id="inputAmount" placeholder="Min 10000" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold border-none">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="topupProcess('manual')" class="py-4 bg-slate-900 text-white rounded-2xl font-bold text-[10px] uppercase">QRIS Manual</button>
                        <button onclick="topupProcess('midtrans')" class="py-4 bg-blue-600 text-white rounded-2xl font-bold text-[10px] uppercase tracking-tighter">Midtrans Auto</button>
                    </div>

                    <div id="paymentDetail" class="hidden pt-4 border-t border-dashed space-y-4">
                        <div id="qrisBox" class="hidden text-center">
                            <img src="https://files.catbox.moe/9d3nxh.png" class="w-full rounded-2xl mb-2 border">
                            <button onclick="confirmManual()" class="w-full py-3 bg-emerald-500 text-white rounded-xl font-bold text-[10px]">KONFIRMASI BAYAR</button>
                        </div>
                    </div>
                </div>

                <div class="mt-8">
                    <h4 class="font-bold text-sm mb-4">Status Topup Terbaru</h4>
                    <div id="userTopupList" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white border rounded-full shadow-2xl p-2 flex justify-around z-50">
            <button onclick="swTab('store')" class="nav-btn flex-1 py-3 text-slate-300"><i class="fa-solid fa-house"></i></button>
            <button onclick="swTab('topup')" class="nav-btn flex-1 py-3 text-slate-300 active"><i class="fa-solid fa-wallet"></i></button>
            <button onclick="swTab('history')" class="nav-btn flex-1 py-3 text-slate-300"><i class="fa-solid fa-receipt"></i></button>
        </div>
    </div>

    <div id="adminLayout" class="section-view bg-slate-950 min-h-screen p-6 text-white">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xl font-black text-blue-500">ADMIN <span class="text-white">DASHBOARD</span></h1>
            <button onclick="location.hash=''" class="bg-slate-800 px-4 py-2 rounded-lg text-[10px]">EXIT</button>
        </div>

        <div class="admin-card">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-6">Pintaan Topup Member</h3>
            <div id="adminTopupList" class="space-y-4">
                <p class="text-center text-slate-600 py-10 text-xs italic">Menunggu data transaksi...</p>
            </div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDS5JjgqG03qAujVRYMBkZde0SBFumWhq8",
            authDomain: "styzenstore-9c0f9.firebaseapp.com",
            databaseURL: "https://styzenstore-9c0f9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "styzenstore-9c0f9",
            storageBucket: "styzenstore-9c0f9.firebasestorage.app",
            messagingSenderId: "368732944579",
            appId: "1:368732944579:web:f43ecd278f369aca0a8a76"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let curU = localStorage.getItem('st_user') || "Guest";

        // === LOGIKA USER ===

        function topupProcess(type) {
            const amt = document.getElementById('inputAmount').value;
            if(!amt || amt < 10000) return alert("Minimal Rp 10.000");

            if(type === 'manual') {
                document.getElementById('paymentDetail').classList.remove('hidden');
                document.getElementById('qrisBox').classList.remove('hidden');
            } else {
                // Di sini biasanya panggil API backend untuk Snap Token.
                // Karena tanpa hosting, kamu bisa arahkan user bayar dulu lalu lapor.
                alert("Sistem Otomatis Midtrans sedang sinkronisasi. Gunakan Manual dahulu.");
            }
        }

        async function confirmManual() {
            const amt = parseInt(document.getElementById('inputAmount').value);
            const trxId = "TRX-" + Date.now();
            await db.ref('topup_requests/' + trxId).set({
                id: trxId, user: curU, amount: amt, status: 'pending', method: 'QRIS Manual', time: new Date().toLocaleString()
            });
            alert("Laporan dikirim! Saldo akan masuk setelah admin ACC.");
            document.getElementById('paymentDetail').classList.add('hidden');
            renderUserTopups();
        }

        function renderUserTopups() {
            db.ref('topup_requests').orderByChild('user').equalTo(curU).on('value', snap => {
                const list = snap.val();
                const container = document.getElementById('userTopupList');
                container.innerHTML = '';
                if(!list) return container.innerHTML = '<p class="text-[10px] text-slate-400">Belum ada riwayat topup.</p>';
                
                Object.values(list).reverse().forEach(req => {
                    const statusColor = req.status === 'success' ? 'text-emerald-500' : 'text-orange-500';
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center">
                            <div>
                                <p class="text-[10px] font-bold text-slate-400">${req.id}</p>
                                <p class="text-sm font-black">Rp ${req.amount.toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-bold ${statusColor} uppercase">${req.status}</p>
                                ${req.method === 'Midtrans' && req.status === 'pending' ? `<button onclick="verifyMidtrans('${req.id}')" class="text-[8px] bg-blue-600 text-white px-2 py-1 rounded-md mt-1">CEK STATUS</button>` : ''}
                            </div>
                        </div>`;
                });
            });
        }

        // === LOGIKA ADMIN ===

        function initAdmin() {
            db.ref('topup_requests').on('value', snap => {
                const data = snap.val();
                const container = document.getElementById('adminTopupList');
                container.innerHTML = '';
                if(!data) return container.innerHTML = '<p class="text-center text-slate-600 text-xs py-10">Tidak ada transaksi.</p>';

                Object.values(data).forEach(req => {
                    if(req.status === 'pending') {
                        container.innerHTML += `
                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex justify-between items-center">
                            <div>
                                <p class="text-[10px] font-bold text-blue-500">${req.user}</p>
                                <p class="text-lg font-black text-white">Rp ${req.amount.toLocaleString()}</p>
                                <p class="text-[8px] text-slate-500">${req.method} | ${req.time}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="approveTrx('${req.id}', '${req.user}', ${req.amount})" class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-check"></i></button>
                                <button onclick="deleteTrx('${req.id}')" class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>`;
                    }
                });
            });
        }

        async function approveTrx(id, user, amt) {
            const userRef = db.ref('users/' + user + '/balance');
            const snap = await userRef.once('value');
            const current = snap.val() || 0;
            await userRef.set(current + amt);
            await db.ref('topup_requests/' + id).update({ status: 'success' });
            alert("Saldo ditambahkan!");
        }

        async function deleteTrx(id) {
            if(confirm("Hapus data ini?")) await db.ref('topup_requests/' + id).remove();
        }

        // === ROUTING & INIT ===

        function checkRoute() {
            const hash = window.location.hash;
            document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active-view'));
            if(hash === '#adminpage') {
                document.getElementById('adminLayout').classList.add('active-view');
                initAdmin();
            } else {
                document.getElementById('userApp').classList.add('active-view');
                renderUserTopups();
                updateBalance();
            }
        }

        async function updateBalance() {
            if(curU === "Guest") return;
            const snap = await db.ref('users/' + curU + '/balance').once('value');
            document.getElementById('userBalanceDisplay').innerText = "Rp " + (snap.val() || 0).toLocaleString();
        }

        window.onhashchange = checkRoute;
        window.onload = checkRoute;

        function swTab(t) {
            document.querySelectorAll('.user-tab').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            // Note: tab-store and tab-history are simplified for this demo
            if(document.getElementById('tab-'+t)) document.getElementById('tab-'+t).classList.remove('hidden');
        }
    </script>
</body>
</html>
